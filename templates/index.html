<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro PDF Converter</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #bb86fc;
            --accent: #03dac6;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }

        .container { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; width: 400px;
        }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 10px; margin: 15px 0;
            border-radius: 5px; border: 1px solid #333;
            background: #2c2c2c; color: white;
        }

        button { 
            background: var(--primary); color: #000; font-weight: bold;
            border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer;
            width: 100%; transition: 0.3s;
        }

        button:hover { background: var(--accent); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 PDF Forge</h1>
        <p>Convert your images into a single PDF.</p>
        
        <form action="/convert" method="post" enctype="multipart/form-data">
            <label>1. Name your PDF:</label>
            <input type="text" name="pdf_name" placeholder="e.g. My_Vacation_Photos">
            
            <label>2. Select Images:</label>
            <input type="file" name="files" multiple required>
            
            <button type="submit">Build PDF</button>
        </form>
    </div>
</body>
</html>
