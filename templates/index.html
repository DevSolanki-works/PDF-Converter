<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Forge Pro | Image to PDF</title>
    <style>
        :root {
            --bg: #121214;
            --card: #1c1c21;
            --text: #e4e4e7;
            --primary: #c97a8e;
            --accent: #a35b6e;
            --border: #2f2f37;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: var(--card); 
            padding: 2.5rem; 
            border-radius: 1rem; 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); 
            text-align: center;
            position: relative; 
            overflow: hidden;
        }

        h1 { 
            color: var(--primary); 
            margin-bottom: 0.5rem; 
            font-size: 1.8rem; 
            font-weight: 600;
        }

        p { 
            opacity: 0.6; 
            margin-bottom: 2rem; 
            font-size: 0.9rem;
        }

        .settings { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            text-align: left; 
            margin-bottom: 20px; 
        }

        .field-full { grid-column: span 2; }

        label { 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            color: var(--text); 
            opacity: 0.8;
            display: block; 
            margin-bottom: 8px;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            background: #121214; 
            border: 1px solid var(--border); 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.2s; 
        }

        input:focus, select:focus { border-color: var(--primary); }

        .drop-zone {
            border: 2px dashed var(--border); 
            padding: 20px; 
            border-radius: 8px;
            margin-bottom: 20px; 
            transition: all 0.2s ease; 
            cursor: pointer; 
            background: rgba(201, 122, 142, 0.03);
        }

        .drop-zone:hover { 
            border-color: var(--primary); 
            background: rgba(201, 122, 142, 0.08); 
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button { 
            background: var(--primary); 
            color: #121214; 
            border: none; 
            padding: 14px; 
            border-radius: 6px; 
            width: 100%; 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        button:hover { background: var(--accent); }
        
        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        
        .btn-secondary:hover { background: #3f3f4a; }

        .preview-grid {
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
            margin-top: 15px;
            max-height: 150px; 
            overflow-y: auto; 
        }

        .preview-grid img {
            width: 60px; 
            height: 60px; 
            object-fit: cover; 
            border-radius: 6px;
            border: 1px solid var(--border); 
        }

        /* Camera Modal Styles */
        #camera-modal {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 20, 0.95); 
            display: none; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            backdrop-filter: blur(5px);
        }

        #video-feed {
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: #000;
        }

        .camera-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 90%;
            max-width: 500px;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28, 28, 33, 0.95); display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 10; 
        }
    </style>
</head>
<body>

    <div id="camera-modal">
        <video id="video-feed" autoplay playsinline></video>
        <div class="camera-controls">
            <button type="button" id="snap-btn">📸 Capture Frame</button>
            <button type="button" id="close-camera" class="btn-secondary">Cancel</button>
        </div>
        <canvas id="camera-canvas" style="display: none;"></canvas>
    </div>

    <div class="container">
        <div id="loading-overlay">
            <h2 id="loading-text" style="color: var(--primary);">Forging PDF...</h2>
        </div>

        <h1>PDF Forge</h1>
        <p>Convert and Secure your Images</p>
        
        <form id="pdf-form">
            <div class="settings">
                <div class="field-full">
                    <label>Document Name</label>
                    <input type="text" name="pdf_name" id="pdf_name" placeholder="e.g. Portfolio_Final">
                </div>
                <div>
                    <label>Page Size</label>
                    <select name="page_size">
                        <option value="A4">A4 (Standard)</option>
                        <option value="Letter">Letter (US)</option>
                    </select>
                </div>
                <div>
                    <label>Orientation</label>
                    <select name="orientation">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                    </select>
                </div>
                <div>
                    <label>Compression</label>
                    <select name="compression">
                        <option value="none">None</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div>
                    <label>Auto Crop</label>
                    <select name="auto_crop">
                        <option value="no">Off</option>
                        <option value="yes">Trim Borders</option>
                    </select>
                </div>
                <div class="field-full">
                    <label>Password (Optional)</label>
                    <input type="password" name="pdf_password" placeholder="Keep it secret">
                </div>
            </div>

            <div class="drop-zone" id="drop-zone">
                <span id="drop-text" style="font-weight:600;">Click or Drag & Drop Images</span>
                <input type="file" name="files" id="file-input" multiple accept="image/*" style="display: none;">
                <div id="preview-container" class="preview-grid"></div>
            </div>

            <div class="action-buttons">
                <button type="button" id="start-camera" class="btn-secondary">📷 Live Camera</button>
                <button type="submit">Forge PDF</button>
            </div>
        </form>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const form = document.getElementById('pdf-form');
        
        // Camera Elements
        const cameraModal = document.getElementById('camera-modal');
        const videoFeed = document.getElementById('video-feed');
        const startCameraBtn = document.getElementById('start-camera');
        const snapBtn = document.getElementById('snap-btn');
        const closeCameraBtn = document.getElementById('close-camera');
        const cameraCanvas = document.getElementById('camera-canvas');
        let stream = null;
        let currentFiles = [];

        // File Selection Logic
        dropZone.onclick = (e) => { if(e.target.tagName !== 'IMG') fileInput.click(); };
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--primary)"; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = "var(--border)"; };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const newImages = Array.from(files).filter(f => f.type.startsWith('image/'));
            currentFiles = [...currentFiles, ...newImages];
            updatePreview();
        }

        function updatePreview() {
            previewContainer.innerHTML = ''; 
            currentFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // Live Camera Logic
        startCameraBtn.onclick = async () => {
            cameraModal.style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                videoFeed.srcObject = stream;
            } catch (err) {
                alert("Camera access denied. Please check browser permissions.");
                cameraModal.style.display = 'none';
            }
        };

        closeCameraBtn.onclick = () => {
            if(stream) stream.getTracks().forEach(track => track.stop());
            cameraModal.style.display = 'none';
        };

        snapBtn.onclick = () => {
            const ctx = cameraCanvas.getContext('2d');
            cameraCanvas.width = videoFeed.videoWidth;
            cameraCanvas.height = videoFeed.videoHeight;
            ctx.drawImage(videoFeed, 0, 0, cameraCanvas.width, cameraCanvas.height);
            
            cameraCanvas.toBlob(blob => {
                const file = new File([blob], `cam_${Date.now()}.jpg`, { type: 'image/jpeg' });
                handleFiles([file]);
                closeCameraBtn.click(); // Close after snap
            }, 'image/jpeg', 0.95);
        };

        // Form Submission
        form.onsubmit = async (e) => {
            e.preventDefault(); 
            if (currentFiles.length === 0) return alert("Select or capture an image first!");

            document.getElementById('loading-overlay').style.display = 'flex';

            const formData = new FormData(form);
            formData.delete('files'); 
            currentFiles.forEach(file => formData.append('files', file)); 

            try {
                const response = await fetch('/convert', { method: 'POST', body: formData });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = (document.getElementById('pdf_name').value || 'Forged_Document') + '.pdf';
                    document.body.appendChild(a);
                    a.click();
                    form.reset();
                    currentFiles = [];
                    updatePreview();
                } else {
                    alert("Server error processing files.");
                }
            } catch (error) {
                alert("Network error.");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        };
    </script>
</body>
</html>
