<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Forge Pro | Image to PDF</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --accent: #03dac6; --border: #334155;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .container { 
            background: var(--card); padding: 2.5rem; border-radius: 1.5rem; 
            width: 100%; max-width: 500px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
            position: relative; overflow: hidden;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 2rem; }
        p { opacity: 0.7; margin-bottom: 2rem; }

        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-bottom: 20px; }
        .field-full { grid-column: span 2; }
        label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--primary); display: block; margin-bottom: 8px;}
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; border: 1px solid var(--border); color: white; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }

        /* DRAG AND DROP */
        .drop-zone {
            border: 2px dashed var(--primary); padding: 30px 20px; border-radius: 12px;
            margin-bottom: 20px; transition: all 0.3s ease; cursor: pointer; background: rgba(15, 23, 42, 0.5);
        }
        .drop-zone:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        .drop-zone.dragover { background: var(--primary); color: #0f172a; border-style: solid; }
        
        /* IMAGE PREVIEWS */
        .preview-grid {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px;
            max-height: 150px; overflow-y: auto; padding-bottom: 10px;
        }
        .preview-grid img {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            border: 2px solid var(--border); transition: 0.3s;
        }
        .preview-grid img:hover { transform: scale(1.1); border-color: var(--primary); }

        button { 
            background: var(--primary); color: #0f172a; border: none; padding: 15px; 
            border-radius: 8px; width: 100%; font-weight: 800; font-size: 1rem; cursor: pointer; 
            transition: 0.2s; margin-top: 10px;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* 🚀 LOADING SCREEN OVERLAY */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; opacity: 0;
            pointer-events: none; transition: opacity 0.3s; border-radius: 1.5rem;
        }
        #loading-overlay.active { opacity: 1; pointer-events: all; }
        
        .spinner {
            border: 5px solid rgba(255,255,255,0.1); border-left-color: var(--primary);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-overlay">
            <div class="spinner"></div>
            <h2 id="loading-text" style="color: var(--primary);">Converting Files...</h2>
            <p>Please wait while we forge your PDF.</p>
        </div>

        <h1>🛠️ PDF Forge</h1>
        <p>Convert and Secure your Images</p>
        
        <form id="pdf-form">
            <div class="settings">
                <div class="field-full">
                    <label>Document Name</label>
                    <input type="text" name="pdf_name" id="pdf_name" placeholder="e.g. Portfolio_Final">
                </div>
                <div>
                    <label>Page Size</label>
                    <select name="page_size">
                        <option value="A4">A4 (Standard)</option>
                        <option value="Letter">Letter (US)</option>
                        <option value="A3">A3 (Large)</option>
                    </select>
                </div>
                <div>
                    <label>Password (Optional)</label>
                    <input type="password" name="pdf_password" placeholder="Keep it secret">
                </div>
            </div>

            <div class="drop-zone" id="drop-zone">
                <span id="drop-text" style="font-weight:bold;">📂 Click or Drag & Drop Images</span>
                <input type="file" name="files" id="file-input" multiple accept="image/*" style="display: none;">
                
                <div id="preview-container" class="preview-grid"></div>
            </div>
            
            <button type="submit">🔥 FORGE PDF</button>
        </form>
    </div>
        <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const dropText = document.getElementById('drop-text');
        const previewContainer = document.getElementById('preview-container');
        const form = document.getElementById('pdf-form');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        // Array to store all selected files
        let currentFiles = [];

        // 1. Click to open file dialog
        dropZone.onclick = (e) => {
            if(e.target.tagName !== 'IMG') fileInput.click();
        };

        // 2. Drag & Drop Visuals
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        dropZone.ondragover = () => dropZone.classList.add('dragover');
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');

        // 3. Handle Dropped Files
        dropZone.ondrop = (e) => {
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };
        
        // Handle Selected Files via Button
        fileInput.onchange = (e) => handleFiles(e.target.files);

        // 4. Additive logic: Append new files to the existing list
        function handleFiles(files) {
            if (files.length === 0) return;
            
            const newImages = Array.from(files).filter(file => file.type.startsWith('image/'));
            currentFiles = [...currentFiles, ...newImages];
            
            dropText.innerText = `✅ ${currentFiles.length} images ready to convert!`;
            previewContainer.innerHTML = ''; 

            currentFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.title = file.name;
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // 5. Submit Form with Loading Screen & Cleanup
        form.onsubmit = async (e) => {
            e.preventDefault(); 
            
            if (currentFiles.length === 0) {
                alert("Please select at least one image!");
                return;
            }

            loadingText.innerText = `Forging ${currentFiles.length} files...`;
            loadingOverlay.classList.add('active');

            const formData = new FormData(form);
            formData.delete('files'); 
            currentFiles.forEach(file => formData.append('files', file)); 

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');

                    a.style.display = 'none';
                    a.href = url;
                    
                    let customName = document.getElementById('pdf_name').value;
                    a.download = customName ? `${customName}.pdf` : 'My_Forged_Document.pdf';
                    
                    document.body.appendChild(a);
                    a.click();

                    // Cleanup to remove the "blob" notification/link
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    // Reset UI
                    form.reset();
                    currentFiles = [];
                    previewContainer.innerHTML = '';
                    dropText.innerText = "📂 Click or Drag & Drop Images";
                } else {
                    alert("Server error. Check your Render logs!");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Connection error. Is the server live?");
            } finally {
                loadingOverlay.classList.remove('active');
            }
        };
    </script>
</body>
</html>
