<!DOCTYPE html>
<html>
<head>
    <title>Pro PDF Converter</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Image to PDF Book</h1>
        <p>Select multiple images to merge them into one PDF.</p>
        <form action="/convert" method="post" enctype="multipart/form-data">
            <input type="file" name="files" multiple> 
            <br><br>
            <button type="submit">Create PDF Book</button>
        </form>
    </div>
</body>
</html>
